<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07060a" />
  <title>404 — Jorge Iván Tordecilla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #07060a;
      color: #eeeae2;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap { display: flex; flex-direction: column; align-items: center; gap: 1.4rem; }
    .code {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(5rem, 20vw, 10rem);
      line-height: 1;
      color: #5ef5c2;
      letter-spacing: -0.04em;
      font-style: italic;
    }
    h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: #eeeae2;
    }
    p { font-size: 0.95rem; color: rgba(238,234,226,0.5); line-height: 1.7; }
    a {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      margin-top: 0.4rem;
      padding: 0.74em 1.4em;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.09);
      color: rgba(238,234,226,0.6);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      transition: color 0.24s, border-color 0.24s, background 0.24s;
    }
    a:hover {
      color: #5ef5c2;
      border-color: rgba(94,245,194,0.25);
      background: rgba(94,245,194,0.08);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="code">404</span>
    <h1>Página no encontrada</h1>
    <p>Esta URL no existe — pero el resto del portafolio sí.</p>
    <a href="/JorgeTordecillaPortfolio/">← Volver al inicio</a>
  </div>
</body>
</html>
